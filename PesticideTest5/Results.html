<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>檢測結算畫面</title>
  <link rel="stylesheet" href="ResultsUI.css">
  <style>
    .samples-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
    }
    .sample-card {
      background: #fff8dc;
      border: 3px solid #333;
      border-radius: 14px;
      padding: 12px;
      text-align: center;
      box-shadow: 2px 2px 4px #ccc;
    }
    .sample-card .title {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .circle-wrapper {
      position: relative;
      width: 110px;
      height: 110px;
      margin: 0 auto;
    }
    svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }
    .percent-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 16px;
      font-weight: bold;
    }
    .status {
      font-size: 18px;
      font-weight: bold;
      margin-top: 6px;
    }
    .buttons {
      margin-top: 20px;
      text-align: center;
    }
    .buttons button {
      padding: 10px 28px;
      font-size: 15px;
      border: 2px solid #444;
      background: #f0f0f0;
      border-radius: 8px;
      cursor: pointer;
    }
    .buttons button:hover { background: #e0e0e0; }
  </style>
</head>
<body>
  <div style="text-align:center; padding: 16px 0 8px; font-size:20px; font-weight:bold;">檢測報告</div>
  <p style="text-align:center; margin:0 0 12px; font-size:13px; color:#666;">農試所判定標準</p>

  <div class="samples-grid" id="samplesGrid">
    <!-- 動態生成 -->
  </div>

  <div class="buttons">
    <button onclick="location.href='intro.html'">返回主頁</button>
  </div>

  <script src="ResultsSW.js"></script>
</body>
</html>
